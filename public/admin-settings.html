<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings | The Dayton Enquirer</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/admin.css" />
  <script>
    (function () {
      try {
        var key = 'de_theme';
        var stored = localStorage.getItem(key);
        var theme = (stored === 'light' || stored === 'dark')
          ? stored
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.colorScheme = theme;
      } catch (_) {}
    })();
  </script>
</head>
<body>
  <header class="news-header">
    <div class="container header-inner">
      <div class="logo">
        <a href="/index.html"><h1>The Dayton Enquirer</h1></a>
      </div>
      <nav>
        <a href="/admin.html">Draft</a>
        <a href="/admin-articles.html">Edit</a>
        <a href="/admin-settings.html">Settings</a>
        <a href="/admin-newsletters.html">Newsletters</a>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch theme" aria-pressed="false">
        <span class="theme-toggle-icon" aria-hidden="true">
          <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M21.64 13a1 1 0 0 0-1.05-.14 8 8 0 0 1-10.45-10.45 1 1 0 0 0-1.2-1.3A10 10 0 1 0 23 15.06a1 1 0 0 0-1.36-2.06Z"/>
          </svg>
          <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M12 7a5 5 0 1 0 5 5 5 5 0 0 0-5-5Zm0 8a3 3 0 1 1 3-3 3 3 0 0 1-3 3Zm0-11a1 1 0 0 0 1-1V2a1 1 0 0 0-2 0v1a1 1 0 0 0 1 1Zm0 16a1 1 0 0 0-1 1v1a1 1 0 0 0 2 0v-1a1 1 0 0 0-1-1Zm10-9h-1a1 1 0 0 0 0 2h1a1 1 0 0 0 0-2ZM4 12a1 1 0 0 0-1-1H2a1 1 0 0 0 0 2h1a1 1 0 0 0 1-1Zm14.36 6.95a1 1 0 0 0-1.41 1.41l.7.71a1 1 0 1 0 1.41-1.41Zm-12.02-12.02a1 1 0 0 0-1.41 0l-.71.7a1 1 0 0 0 1.41 1.42l.71-.71a1 1 0 0 0 0-1.41Zm12.02-1.41-.7.71a1 1 0 0 0 1.41 1.41l.7-.71a1 1 0 1 0-1.41-1.41ZM6.34 17.66l-.71.7a1 1 0 0 0 1.42 1.41l.7-.7a1 1 0 0 0-1.41-1.41Z"/>
          </svg>
        </span>
      </button>
      </nav>
    </div>
  </header>

  <main class="container admin-page">
    <section id="settings-lock" class="admin-panel admin-lock">
      <h2>Admin Access Required</h2>
      <p class="hint">Enter your admin UI password to unlock this page.</p>
      <div class="admin-grid single">
        <label>
          Admin UI Password
          <input id="admin-ui-password" type="password" placeholder="Enter password" />
        </label>
      </div>
      <div class="admin-actions">
        <button id="unlock-admin-btn" class="btn btn-primary">Unlock Settings</button>
      </div>
    </section>

    <section id="settings-app" hidden>
      <section class="admin-panel">
        <h2>Manual Budget</h2>
        <p class="hint">Auto budget and auto budget stats have been removed. Manual budget is now the only budget mode.</p>
        <div class="admin-grid">
          <label>
            Admin Token
            <input id="admin-token" type="password" placeholder="Paste ADMIN_API_TOKEN" />
          </label>
          <label>
            Manual Daily Token Budget
            <input id="manual-budget-input" type="number" min="1" step="1000" value="350000" />
          </label>
          <label>
            Run Log Limit
            <input id="run-limit" type="number" min="1" max="500" value="50" />
          </label>
        </div>
        <div class="admin-actions">
          <button id="save-token-btn" class="btn">Save Token</button>
          <button id="save-manual-budget-btn" class="btn">Save Manual Budget</button>
          <button id="load-runs-btn" class="btn btn-primary">Load Generation Runs</button>
        </div>
        <div id="settings-message" class="message" hidden></div>
      </section>

      <section class="admin-panel">
        <article class="draft-card">
          <button class="draft-header draft-toggle btn-reset" type="button">
            <strong>Generation Runs</strong>
            <span class="draft-meta">Manual draft generation run log</span>
          </button>
          <div class="article-editor section-editor is-collapsed" hidden>
            <div class="admin-grid single">
              <label>
                Run Filter
                <select id="run-filter">
                  <option value="all">All runs</option>
                  <option value="failed_or_skipped">Only failed/skipped</option>
                  <option value="underfilled">Only underfilled</option>
                  <option value="failed_or_underfilled">Failed + underfilled</option>
                </select>
              </label>
            </div>
            <div id="generation-run-list" class="duplicate-list"></div>
          </div>
        </article>
      </section>
    </section>
  </main>

  <script src="/theme.js"></script>
  <script src="/admin-settings.js"></script>
</body>
</html>
