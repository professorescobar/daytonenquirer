<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Draft Admin | The Dayton Enquirer</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/admin.css" />
  <script>
    (function () {
      try {
        var key = 'de_theme';
        var stored = localStorage.getItem(key);
        var theme = (stored === 'light' || stored === 'dark')
          ? stored
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.colorScheme = theme;
      } catch (_) {}
    })();
  </script>
</head>
<body>
  <header class="news-header">
    <div class="container header-inner">
      <div class="logo">
        <a href="/index.html"><h1>The Dayton Enquirer</h1></a>
      </div>
      <nav>
        <a href="/admin.html">Draft</a>
        <a href="/admin-articles.html">Edit</a>
        <a href="/admin-settings.html">Settings</a>
        <a href="/admin-newsletters.html">Newsletters</a>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch theme" aria-pressed="false">
        <span class="theme-toggle-icon" aria-hidden="true">
          <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M21.64 13a1 1 0 0 0-1.05-.14 8 8 0 0 1-10.45-10.45 1 1 0 0 0-1.2-1.3A10 10 0 1 0 23 15.06a1 1 0 0 0-1.36-2.06Z"/>
          </svg>
          <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M12 7a5 5 0 1 0 5 5 5 5 0 0 0-5-5Zm0 8a3 3 0 1 1 3-3 3 3 0 0 1-3 3Zm0-11a1 1 0 0 0 1-1V2a1 1 0 0 0-2 0v1a1 1 0 0 0 1 1Zm0 16a1 1 0 0 0-1 1v1a1 1 0 0 0 2 0v-1a1 1 0 0 0-1-1Zm10-9h-1a1 1 0 0 0 0 2h1a1 1 0 0 0 0-2ZM4 12a1 1 0 0 0-1-1H2a1 1 0 0 0 0 2h1a1 1 0 0 0 1-1Zm14.36 6.95a1 1 0 0 0-1.41 1.41l.7.71a1 1 0 1 0 1.41-1.41Zm-12.02-12.02a1 1 0 0 0-1.41 0l-.71.7a1 1 0 0 0 1.41 1.42l.71-.71a1 1 0 0 0 0-1.41Zm12.02-1.41-.7.71a1 1 0 0 0 1.41 1.41l.7-.71a1 1 0 1 0-1.41-1.41ZM6.34 17.66l-.71.7a1 1 0 0 0 1.42 1.41l.7-.7a1 1 0 0 0-1.41-1.41Z"/>
          </svg>
        </span>
      </button>
      </nav>
    </div>
  </header>

  <main class="container admin-page">
    <section id="admin-lock" class="admin-panel admin-lock">
      <h2>Admin Access Required</h2>
      <p class="hint">Enter your admin UI password to unlock this page.</p>
      <div class="admin-grid single">
        <label>
          Admin UI Password
          <input id="admin-ui-password" type="password" placeholder="Enter password" />
        </label>
      </div>
      <div class="admin-actions">
        <button id="unlock-admin-btn" class="btn btn-primary">Unlock Admin</button>
      </div>
    </section>

    <section id="admin-app" hidden>
      <section class="admin-panel">
        <article class="draft-card">
          <button class="draft-header section-toggle btn-reset" type="button">
            <strong>Write Your Own Article</strong>
            <span class="draft-meta">Create a blank draft in your selected section</span>
          </button>
          <div class="article-editor is-collapsed section-editor" hidden>
            <div class="admin-grid">
              <label>
                Admin Token
                <input id="manual-admin-token" type="password" placeholder="Paste ADMIN_API_TOKEN" />
              </label>
            </div>
            <div class="admin-actions">
              <button id="save-manual-token-btn" class="btn">Save Token</button>
            </div>
            <div class="admin-grid">
              <label>
                Draft Title
                <input id="manual-title" type="text" placeholder="Optional title for your new draft" />
              </label>
              <label>
                Section
                <select id="manual-section">
                  <option value="local">local</option>
                  <option value="national">national</option>
                  <option value="world">world</option>
                  <option value="business">business</option>
                  <option value="sports">sports</option>
                  <option value="health">health</option>
                  <option value="entertainment">entertainment</option>
                  <option value="technology">technology</option>
                </select>
              </label>
            </div>
            <div class="admin-actions">
              <button id="create-draft-btn" class="btn">Create Blank Draft</button>
            </div>
          </div>
        </article>

        <article class="draft-card">
          <button class="draft-header section-toggle btn-reset" type="button">
            <strong>Manual Draft Generation</strong>
            <span class="draft-meta">Generate drafts by count and optional section filters</span>
          </button>
          <div class="article-editor is-collapsed section-editor" hidden>
            <div class="admin-grid">
              <label>
                Admin Token
                <input id="gen-admin-token" type="password" placeholder="Paste ADMIN_API_TOKEN" />
              </label>
            </div>
            <div class="admin-actions">
              <button id="save-gen-token-btn" class="btn">Save Token</button>
            </div>
            <div class="admin-grid">
              <label>
                Count
                <input id="gen-count" type="number" min="1" max="20" value="3" />
              </label>
              <label>
                Model Source
                <select id="gen-provider">
                  <option value="anthropic">Opus (Anthropic)</option>
                  <option value="openai">ChatGPT (OpenAI)</option>
                  <option value="gemini">Gemini (Google)</option>
                  <option value="grok">Grok (xAI)</option>
                  <option value="all" selected>All (Opus + ChatGPT + Gemini + Grok)</option>
                </select>
              </label>
              <label>
                Include Sections (comma list)
                <input id="gen-include" type="text" placeholder="local,national,world" />
              </label>
              <label>
                Exclude Sections (comma list)
                <input id="gen-exclude" type="text" placeholder="health,entertainment,technology" />
              </label>
            </div>
            <div class="admin-actions">
              <button id="generate-btn" class="btn btn-primary">Generate Drafts</button>
            </div>
            <p class="draft-meta">
              Manual tokens used today:
              <strong id="manual-usage-tokens">0</strong>
              |
              Manual budget remaining:
              <strong id="manual-usage-remaining">100%</strong>
            </p>
          </div>
        </article>

        <article class="draft-card">
          <div class="draft-header">
            <strong>Draft Operations</strong>
            <span class="draft-meta">Load, review, edit, publish, or permanently delete drafts</span>
          </div>
          <div class="article-editor">
            <div class="admin-grid">
              <label>
                Admin Token
                <input id="admin-token" type="password" placeholder="Paste ADMIN_API_TOKEN" />
              </label>
              <label>
                Status Filter
                <select id="status-filter">
                  <option value="pending_review" selected>pending_review</option>
                  <option value="published">published</option>
                  <option value="all">all</option>
                </select>
              </label>
              <label>
                List Limit
                <input id="list-limit" type="number" min="1" max="200" value="25" />
              </label>
            </div>

            <div class="admin-actions">
              <button id="save-token-btn" class="btn">Save Token</button>
              <button id="load-drafts-btn" class="btn">Load Drafts</button>
            </div>

            <div id="admin-message" class="message" hidden></div>
            <div id="draft-list" class="draft-list"></div>
          </div>
        </article>
      </section>

    </section>
  </main>

  <script src="/theme.js"></script>


  <script src="/admin.js"></script>
</body>
</html>
