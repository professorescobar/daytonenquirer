<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Published Editor | The Dayton Enquirer</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/admin.css" />
</head>
<body>
  <header class="news-header">
    <div class="container header-inner">
      <div class="logo">
        <a href="/index.html"><h1>The Dayton Enquirer</h1></a>
      </div>
      <nav>
        <a href="/admin.html">Draft Admin</a>
        <a href="/admin-articles.html">Published Editor</a>
      </nav>
    </div>
  </header>

  <main class="container admin-page">
    <section id="article-lock" class="admin-panel admin-lock">
      <h2>Admin Access Required</h2>
      <p class="hint">Enter your admin UI password to unlock this page.</p>
      <div class="admin-grid single">
        <label>
          Admin UI Password
          <input id="admin-ui-password" type="password" placeholder="Enter password" />
        </label>
      </div>
      <div class="admin-actions">
        <button id="unlock-admin-btn" class="btn btn-primary">Unlock Editor</button>
      </div>
    </section>

    <section id="article-app" hidden>
      <section class="admin-panel">
        <h2>Published Articles Editor</h2>
        <p class="hint">Edit existing published articles directly.</p>
        <div class="admin-grid">
          <label>
            Admin Token
            <input id="admin-token" type="password" placeholder="Paste ADMIN_API_TOKEN" />
          </label>
        <label>
          Section Filter
            <select id="article-section-filter">
              <option value="all" selected>all</option>
              <option value="local">local</option>
              <option value="national">national</option>
              <option value="world">world</option>
              <option value="business">business</option>
              <option value="sports">sports</option>
              <option value="health">health</option>
              <option value="entertainment">entertainment</option>
              <option value="technology">technology</option>
            </select>
        </label>
        <label>
          <span class="list-limit-label">List Limit (<span id="article-total-count">-</span> total)</span>
          <input id="article-list-limit" type="number" min="25" max="5000" step="25" value="50" />
        </label>
      </div>
        <div class="admin-actions">
          <button id="save-token-btn" class="btn">Save Token</button>
          <button id="load-articles-btn" class="btn btn-primary">Load Published Articles</button>
          <button id="show-all-btn" class="btn">Show All</button>
        </div>
        <div class="admin-grid single">
          <label>
            Search (headline or pub date)
            <input id="article-search" type="text" placeholder="Ex: summit or 2/20/2026 or 10:52 PM" />
          </label>
        </div>
      </section>

      <section class="admin-panel">
        <div id="admin-message" class="message" hidden></div>
        <div id="article-list" class="draft-list"></div>
      </section>

      <div id="article-remove-modal" class="admin-modal" hidden>
        <div class="admin-modal-backdrop"></div>
        <div class="admin-modal-card" role="dialog" aria-modal="true" aria-labelledby="article-remove-title">
          <h4 id="article-remove-title">Remove Published Article</h4>
          <p class="hint">Choose how this article should be categorized before removal.</p>
          <label>
            Removal Type
            <select id="article-remove-action">
              <option value="duplicate">report duplicate</option>
              <option value="reject">reject</option>
            </select>
          </label>
          <label>
            Reject Reason (required for reject)
            <select id="article-remove-reason">
              <option value="">Select a reason</option>
              <option value="stale_or_not_time_relevant">stale_or_not_time_relevant</option>
              <option value="low_newsworthiness_or_thin">low_newsworthiness_or_thin</option>
              <option value="style_mismatch">style_mismatch</option>
            </select>
          </label>
          <label>
            Notes (optional)
            <textarea id="article-remove-notes" rows="4" placeholder="Optional context"></textarea>
          </label>
          <div class="admin-actions">
            <button id="article-remove-confirm-btn" class="btn btn-warning">Confirm Remove</button>
            <button id="article-remove-cancel-btn" class="btn">Cancel</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="/admin-articles.js"></script>
</body>
</html>
